version: "3.9"

services:
  # 1. Judge Service (Native Code Execution)
  judge0:
    build: ./Judge
    container_name: code-judge
    ports:
      - "7001:7001"
    volumes:
      - ./Judge:/app
      - /app/node_modules
    env_file:
      - ./Backend/.env
    networks:
      codebench-network:
        aliases:
          - code-judge # Now 'code-judge' works as a URL

  # 2. Backend Service (Main API & Socket Server)
  backend:
    build: ./Backend
    container_name: codebench-backend
    ports:
      - "8000:8000"
    depends_on:
      - judge0
    volumes:
      - ./Backend:/app
      - /app/node_modules
    env_file:
      - ./Backend/.env
    networks:
      - codebench-network

# 🔹 Networks (Volumes removed since Judge uses its own /temp folder now)
networks:
  codebench-network:
    driver: bridge
